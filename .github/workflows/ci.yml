name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint backend
        run: ruff check app
      - name: Test backend
        run: pytest
      - name: Build backend image
        run: docker build -t decision-sim-backend .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        run: npm install
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build
      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost:8000/api/v1 -t decision-sim-frontend .
